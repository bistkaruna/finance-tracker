{% extends 'core/base.html' %}
{% block title %}Change Password - Finance Tracker{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 40px auto;">
    <div class="card">
        <div class="card-header" style="background: #2563eb; color: white;">
            <h3 style="margin: 0;">Change Password</h3>
        </div>
        <div class="card-body">
            <form method="post" onsubmit="return validatePasswordForm()">
                {% csrf_token %}
                
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="old_password" class="form-control" id="oldPassword" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password1" class="form-control" id="newPassword1" required>
                    <small>At least 8 characters</small>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="new_password2" class="form-control" id="newPassword2" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                    <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function validatePasswordForm() {
    var newPass1 = document.getElementById('newPassword1').value;
    var newPass2 = document.getElementById('newPassword2').value;
    
    if (newPass1.length < 8) {
        alert('New password must be at least 8 characters long');
        return false;
    }
    if (newPass1 !== newPass2) {
        alert('New passwords do not match');
        return false;
    }
    return true;
}
</script>
{% endblock %}
